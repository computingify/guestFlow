name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Run database migrations (ALTER TABLE additions). Safe but optional — never deletes data.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  deploy:
    runs-on: self-hosted  # Runner self-hosted sur le Raspberry Pi 5
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Must match the Node major installed on the Pi (`node -v`). The PM2 daemon on the
          # Pi was launched with the system Node, and any native module (notably
          # better-sqlite3) compiled against a different `NODE_MODULE_VERSION` will refuse to
          # load at runtime (`ERR_DLOPEN_FAILED`, `NODE_MODULE_VERSION N ... M`). If you bump
          # the Pi's Node via apt, bump this pin in the same PR.
          node-version: '24'
          cache: 'npm'

      - name: 🔎 Sanity-check Node + npm versions
        run: |
          echo "Node:     $(node -v)"
          echo "npm:      $(npm -v)"
          echo "ABI:      NODE_MODULE_VERSION $(node -p 'process.versions.modules')"
          echo "PATH:     $PATH" | head -c 400; echo
          # If the system PM2 daemon was started with a different Node, alert loudly — the
          # native modules we're about to build won't be loadable.
          if command -v pm2 >/dev/null 2>&1; then
            DAEMON_NODE=$(pm2 prettylist 2>/dev/null | grep -m1 -oE '"node_version":"[^"]+"' | cut -d'"' -f4 || true)
            if [ -n "$DAEMON_NODE" ]; then
              echo "PM2 daemon Node: $DAEMON_NODE"
              if [ "${DAEMON_NODE%%.*}" != "$(node -v | tr -d v | cut -d. -f1)" ]; then
                echo "⚠ PM2 daemon major Node version differs from the workflow's Node — restart the PM2 daemon to align."
              fi
            fi
          fi

      - name: 📚 Install root dependencies
        run: npm install

      - name: ⚛️ Build React client
        # `GENERATE_SOURCEMAP=false` keeps the un-minified bundle off the prod server. A
        # publicly-fetched .map file leaks the full module tree, original variable names
        # and any compile-time constants — gratis recon for any visitor. Spotted in the
        # 2026-06-01 security audit (finding H1).
        run: |
          cd client
          npm install
          GENERATE_SOURCEMAP=false npm run build
          cd ..

      - name: 📦 Create release archive
        run: |
          chmod +x ./release.sh
          ./release.sh "guestflow-release"
          echo "✓ Release archive created: guestflow-release.zip"

      - name: ⏹️ Stop existing PM2 service
        run: |
          pm2 stop guestflow 2>/dev/null || true
          pm2 delete guestflow 2>/dev/null || true
          echo "✓ Previous service stopped"

      - name: 💾 Create persistent data directory
        run: |
          PERSISTENT_DB_DIR="$HOME/guestflow/data"
          PERSISTENT_DB="$PERSISTENT_DB_DIR/guestflow.db"
          mkdir -p "$PERSISTENT_DB_DIR"
          echo "✓ Persistent data directory created: $PERSISTENT_DB_DIR"

      - name: 🔄 Migrate legacy database location
        run: |
          PERSISTENT_DB_DIR="$HOME/guestflow/data"
          PERSISTENT_DB="$PERSISTENT_DB_DIR/guestflow.db"
          LEGACY_DB="$HOME/guestflow/current/server/guestflow.db"
          
          if [ ! -f "$PERSISTENT_DB" ] && [ -f "$LEGACY_DB" ]; then
            cp "$LEGACY_DB" "$PERSISTENT_DB"
            echo "✓ Database migrated from legacy location"
          else
            echo "ℹ Database already at persistent location or doesn't exist yet"
          fi

      - name: 💾 Backup database before deploy
        run: |
          PERSISTENT_DB_DIR="$HOME/guestflow/data"
          PERSISTENT_DB="$PERSISTENT_DB_DIR/guestflow.db"
          
          if [ -f "$PERSISTENT_DB" ]; then
            BACKUP="$PERSISTENT_DB_DIR/backup-$(date +%Y%m%d-%H%M%S).db"
            cp "$PERSISTENT_DB" "$BACKUP"
            echo "✓ Pre-deploy backup saved"
            # Keep only last 5 backups
            ls -1t "$PERSISTENT_DB_DIR"/backup-*.db 2>/dev/null | tail -n +6 | xargs rm -f || true
            echo "✓ Old backups cleaned (kept last 5)"
          else
            echo "ℹ No existing database to backup"
          fi

      - name: 📥 Backup existing uploads
        run: |
          DEPLOY_DIR="$HOME/guestflow"
          if [ -d "$DEPLOY_DIR/current/server/uploads" ]; then
            cp -r "$DEPLOY_DIR/current/server/uploads" /tmp/_guestflow_uploads_backup || true
            echo "✓ Uploads backed up to /tmp/_guestflow_uploads_backup"
          else
            echo "ℹ No existing uploads to backup"
          fi

      - name: 🗜️ Archive previous version
        run: |
          DEPLOY_DIR="$HOME/guestflow"
          mkdir -p "$DEPLOY_DIR"
          cd "$DEPLOY_DIR"
          
          if [ -d "current" ]; then
            mv current "backup-$(date +%Y%m%d-%H%M%S)"
            echo "✓ Previous version archived"
            # Keep only last 3 backups
            ls -1dt backup-* 2>/dev/null | tail -n +4 | xargs rm -rf || true
            echo "✓ Old version backups cleaned (kept last 3)"
          else
            echo "ℹ No previous version to archive"
          fi

      - name: 📂 Extract new release
        run: |
          RELEASE_NAME="guestflow-release"
          DEPLOY_DIR="$HOME/guestflow"
          
          mkdir -p "$DEPLOY_DIR"
          cd "$DEPLOY_DIR"
          
          # Find the zip file in the workspace
          ZIP_FILE=$(find . -maxdepth 1 -name "$RELEASE_NAME.zip" 2>/dev/null | head -1)
          
          # If not found locally, check in the runner's workspace
          if [ -z "$ZIP_FILE" ]; then
            ZIP_FILE="${GITHUB_WORKSPACE}/$RELEASE_NAME.zip"
          fi
          
          if [ ! -f "$ZIP_FILE" ]; then
            echo "❌ Error: Could not find $RELEASE_NAME.zip"
            echo "Searched in: $DEPLOY_DIR and $GITHUB_WORKSPACE"
            ls -la "$GITHUB_WORKSPACE" | head -20
            exit 1
          fi
          
          echo "✓ Found release at: $ZIP_FILE"
          
          mkdir -p current
          unzip -q "$ZIP_FILE"
          mv "${RELEASE_NAME}"/* current
          rm -r "${RELEASE_NAME}" 2>/dev/null || true
          echo "✓ Release extracted to current/"
          echo "✓ Files extracted:"
          ls -la current/

      - name: 🔗 Create symlink for persistent database
        run: |
          DEPLOY_DIR="$HOME/guestflow"
          PERSISTENT_DB="$HOME/guestflow/data/guestflow.db"

          # Ensure the persistent DB directory and file exist
          mkdir -p "$(dirname "$PERSISTENT_DB")"

          # Create empty DB if it doesn't exist
          if [ ! -f "$PERSISTENT_DB" ]; then
            touch "$PERSISTENT_DB"
            echo "✓ Created new persistent database"
          else
            echo "✓ Using existing database"
          fi

          # Remove old symlink if it exists
          rm -f "$DEPLOY_DIR/current/server/guestflow.db" 2>/dev/null || true

          # Create symlink from deployment to persistent location
          ln -s "$PERSISTENT_DB" "$DEPLOY_DIR/current/server/guestflow.db"

          echo "✓ Database symlink created"
          ls -la "$DEPLOY_DIR/current/server/guestflow.db"

      - name: 🔒 Provision self-signed TLS cert (one-time, persistent across deploys)
        run: |
          CERTS_DIR="$HOME/guestflow/certs"
          CERT_FILE="$CERTS_DIR/server.crt"
          KEY_FILE="$CERTS_DIR/server.key"

          mkdir -p "$CERTS_DIR"

          if [ -f "$CERT_FILE" ] && [ -f "$KEY_FILE" ]; then
            echo "✓ TLS cert already provisioned at $CERTS_DIR — leaving it alone."
            echo "  (regenerate manually with --force on the script if the cert nears expiry)"
          else
            echo "ℹ No TLS cert found — generating a fresh self-signed cert."
            chmod +x "$HOME/guestflow/current/server/scripts/generate-self-signed-cert.sh"
            OUT_DIR="$CERTS_DIR" "$HOME/guestflow/current/server/scripts/generate-self-signed-cert.sh"
          fi

          ls -la "$CERTS_DIR"

      - name: 📥 Restore uploads
        run: |
          DEPLOY_DIR="$HOME/guestflow"
          
          if [ -d /tmp/_guestflow_uploads_backup ]; then
            mkdir -p "$DEPLOY_DIR/current/server"
            cp -r /tmp/_guestflow_uploads_backup "$DEPLOY_DIR/current/server/uploads" || true
            rm -rf /tmp/_guestflow_uploads_backup
            echo "✓ Uploads restored"
          else
            echo "ℹ No uploads to restore"
          fi

      - name: 📦 Install server dependencies
        run: |
          DEPLOY_DIR="$HOME/guestflow"
          cd "$DEPLOY_DIR/current/server"

          if [ -f package-lock.json ]; then
            npm ci --omit=dev || npm install --omit=dev
          else
            npm install --omit=dev
          fi
          echo "✓ Server dependencies installed"

      - name: 🔧 Force-rebuild native modules against the runtime Node
        # Defense in depth: even with the right `node-version` pin above, npm sometimes pulls
        # a prebuilt binary from the package's GitHub releases (better-sqlite3 ships those).
        # Force a rebuild from source so the ABI is guaranteed to match the Node we're about
        # to start PM2 with. Cheap on the Pi (~30 s for better-sqlite3); avoids the silent
        # ABI-mismatch crash loop entirely.
        run: |
          DEPLOY_DIR="$HOME/guestflow"
          cd "$DEPLOY_DIR/current/server"
          echo "Rebuilding native modules against Node $(node -v) (ABI v$(node -p 'process.versions.modules'))..."
          npm rebuild --build-from-source better-sqlite3
          echo "✓ Native modules rebuilt against the runtime Node ABI"
          # Verify it actually loads — a broken rebuild here is much better than discovering
          # it via the PM2 errored state right after `pm2 start`.
          node -e "require('better-sqlite3'); console.log('✓ better-sqlite3 loads OK')"

      - name: 🗄️ Run database migrations
        run: |
          PERSISTENT_DB="$HOME/guestflow/data/guestflow.db"
          
          echo "Running database migrations to ensure schema is up-to-date..."
          cd "$HOME/guestflow/current/server"
          
          # Run migrations with explicit DB_PATH (ALWAYS run migrations to keep schema in sync)
          DB_PATH="$PERSISTENT_DB" \
          SKIP_MIGRATIONS=false \
          node -e "
            const dbPath = process.env.DB_PATH;
            console.log('Initializing database at:', dbPath);
            require('./src/database.js');
            console.log('✓ Migrations complete');
          "
          
          if [ $? -eq 0 ]; then
            echo "✓ Migrations completed successfully"
          else
            echo "❌ Migrations failed - this is critical"
            exit 1
          fi

      - name: 🚀 Start service with PM2
        run: |
          PERSISTENT_DB="$HOME/guestflow/data/guestflow.db"
          
          # Verify database exists and is accessible
          if [ ! -f "$PERSISTENT_DB" ]; then
            echo "❌ Error: Persistent database not found at $PERSISTENT_DB"
            exit 1
          fi
          
          # Verify symlink is correct
          if [ ! -L "$HOME/guestflow/current/server/guestflow.db" ]; then
            echo "❌ Error: Database symlink not found or invalid"
            ls -la "$HOME/guestflow/current/server/" | grep guestflow
            exit 1
          fi
          
          echo "✓ Database verified at: $PERSISTENT_DB"
          echo "✓ Service symlink verified"
          
          # Start service with explicit DB_PATH + TLS material paths (persistent across deploys).
          # HTTPS_ENABLED=true → Node serves directly on :4000 over TLS using the self-signed cert
          # provisioned by the previous step. The browser warns once per device that the cert isn't
          # signed by a known CA (expected for a LAN-only deploy); after the user accepts, HSTS
          # makes HTTPS sticky from then on. See README §HTTPS for the cert-trust workflow.
          NODE_ENV=production \
          HTTPS_ENABLED=true \
          TLS_CERT_PATH="$HOME/guestflow/certs/server.crt" \
          TLS_KEY_PATH="$HOME/guestflow/certs/server.key" \
          DB_PATH="$PERSISTENT_DB" \
          SKIP_MIGRATIONS=false \
          APP_COMMIT_SHA="${GITHUB_SHA}" \
          pm2 start "$HOME/guestflow/current/server/src/index.js" --name guestflow --update-env
          
          pm2 save
          pm2 startup systemd -u "$USER" --hp "$HOME" || true
          
          echo "✓ Service started with PM2"
          echo "✓ Database path: $PERSISTENT_DB"

      - name: ✅ Check service status
        if: success()
        run: |
          sleep 2
          echo "===== Service Status ====="
          pm2 status || echo "PM2 status unavailable"
          echo ""
          echo "===== Application Logs (last 30 lines) ====="
          pm2 logs guestflow --lines 30 --nostream || echo "Logs unavailable"

      - name: 🔍 Troubleshooting - Collect debug logs
        if: failure()
        run: |
          echo "===== Deployment encountered an issue — collecting debug info ====="
          pm2 logs guestflow --lines 50 --nostream || echo "PM2 logs unavailable"
          echo ""
          echo "===== Database location ====="
          ls -la "$HOME/guestflow/data/" || echo "Data directory not found"
          echo ""
          echo "===== Deployment directory ====="
          ls -la "$HOME/guestflow/current/server/" || echo "Deployment directory not found"


